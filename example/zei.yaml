# Example zei configuration file
# This demonstrates the MVP features of zei

services:
  # Simple service that runs a command
  - name: echo-service
    command: /bin/sh -c "while true; do echo 'Hello from echo-service'; sleep 5; done"
    restart: always
    user: nobody
    env:
      LOG_LEVEL: info

  # Service running as a different user
  - name: worker
    command: ["/usr/bin/python3", "-c", "import time; [print(f'Worker tick {i}') or time.sleep(3) for i in range(100)]"]
    restart: on-failure
    user: nobody
    working_dir: /tmp

  # Service that doesn't restart
  - name: oneoff
    command: /bin/echo "This runs once and exits"
    restart: never

  # Example of a more realistic service (uncomment if you have nginx)
  # - name: web
  #   command: /usr/sbin/nginx -g "daemon off;"
  #   user: www-data
  #   group: www-data
  #   working_dir: /var/www
  #   restart: always
  #   env:
  #     PORT: "8080"

# Notes:
# - All specified users and groups must exist in the container
# - The zei binary must have the setuid bit set and be owned by root
# - Services will be started in the order they appear in this file
# - Restart policies: always, on-failure, never

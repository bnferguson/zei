version: "1.0"

services:
  echo:
    command: ["/bin/sh", "-c", "trap 'exit 0' TERM; while true; do echo 'echo running'; sleep 2 & wait; done"]
    user: appuser
    group: appgroup
    restart: always
    max_restarts: 3
    restart_delay: 1s

  worker:
    command: ["/bin/sh", "-c", "trap 'exit 0' TERM; while true; do echo 'worker running'; sleep 3 & wait; done"]
    user: worker
    group: worker
    restart: on-failure
    max_restarts: 5
    restart_delay: 1s

  monitor:
    command: ["/bin/sh", "-c", "echo 'health check'; sleep 1"]
    user: monitor
    group: monitor
    interval: 10s
    oneshot: true
    depends_on: ["echo", "worker"]

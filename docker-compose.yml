version: '3.8'

services:
  zei-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: zei:latest
    container_name: zei-test
    volumes:
      - ./test/services-test.yml:/config/services.yml:ro
    # Run as PID 1 to test full init functionality
    init: false
    # Allow the init system to work properly
    privileged: true
    # Interactive mode to see logs
    stdin_open: true
    tty: true

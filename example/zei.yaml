version: "1.0"

services:
  echo:
    command: ["sh", "-c", "while true; do echo 'echo service running'; sleep 5; done"]
    user: appuser
    group: appuser
    restart: always
    max_restarts: 3
    restart_delay: 5s

  counter:
    command: ["sh", "-c", "i=0; while true; do echo \"counter: $i\"; i=$((i+1)); sleep 2; done"]
    user: worker
    group: worker
    restart: on-failure
    max_restarts: 5
    restart_delay: 2s

  healthcheck:
    command: ["sh", "-c", "echo 'Health check running at $(date)'; sleep 1"]
    user: monitor
    group: monitor
    interval: 30s
    oneshot: true
    depends_on: ["echo", "counter"]

  zombie_maker:
    command: ["/usr/local/bin/zombie_maker"]
    user: zombie
    group: zombie
    restart: always
    max_restarts: 10
    restart_delay: 5s
    stdout: /dev/stdout
    stderr: /dev/stderr
    environment:
      LOG_LEVEL: debug

  signal_handler:
    command: ["sh", "/example/signal-handler.sh"]
    user: appuser
    group: appuser
    restart: always
    max_restarts: 3
    restart_delay: 5s

  json_logger:
    command: ["sh", "/example/json-logger.sh"]
    user: appuser
    group: appuser
    restart: always
    max_restarts: 3
    restart_delay: 5s
    json_logs: true
